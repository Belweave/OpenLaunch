services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  openlaunch:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/belweave/openlaunch:${OPENLAUNCH_DOCKER_TAG-main}
    container_name: openlaunch
    volumes:
      - openlaunch:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPENLAUNCH_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'OPENLAUNCH_SECRET_KEY='
      - 'ENABLE_DATA_SOURCE_TOOLS=${ENABLE_DATA_SOURCE_TOOLS-false}'
      - 'DATA_SOURCE_CONNECTIONS=${DATA_SOURCE_CONNECTIONS-[]}'
      - 'DATA_SOURCE_CONNECTIONS_FILE=${DATA_SOURCE_CONNECTIONS_FILE-}'
      - 'DATA_SOURCE_MAX_ROWS=${DATA_SOURCE_MAX_ROWS-200}'
      - 'DATA_SOURCE_QUERY_TIMEOUT_SECONDS=${DATA_SOURCE_QUERY_TIMEOUT_SECONDS-15}'
      - 'DATA_SOURCE_MAX_RESULT_BYTES=${DATA_SOURCE_MAX_RESULT_BYTES-100000}'
      - 'DATA_SOURCE_MAX_QUERY_CHARACTERS=${DATA_SOURCE_MAX_QUERY_CHARACTERS-20000}'
      - 'USER_PERMISSIONS_FEATURES_DATA_SOURCES=${USER_PERMISSIONS_FEATURES_DATA_SOURCES-false}'
      # Legacy single-PostgreSQL settings remain supported for upgrades.
      - 'ENABLE_SQL_DATABASE_TOOL=${ENABLE_SQL_DATABASE_TOOL-false}'
      - 'SQL_DATABASE_URL=${SQL_DATABASE_URL-}'
      - 'USER_PERMISSIONS_FEATURES_SQL_DATABASE=${USER_PERMISSIONS_FEATURES_SQL_DATABASE-false}'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  openlaunch: {}
