services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  openlaunch:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/belweave/openlaunch:${OPENLAUNCH_DOCKER_TAG-main}
    container_name: openlaunch
    volumes:
      - openlaunch:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPENLAUNCH_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'OPENLAUNCH_SECRET_KEY='
      - 'ENABLE_SQL_DATABASE_TOOL=${ENABLE_SQL_DATABASE_TOOL-false}'
      - 'SQL_DATABASE_URL=${SQL_DATABASE_URL-}'
      - 'SQL_DATABASE_MAX_ROWS=${SQL_DATABASE_MAX_ROWS-200}'
      - 'SQL_DATABASE_QUERY_TIMEOUT_SECONDS=${SQL_DATABASE_QUERY_TIMEOUT_SECONDS-15}'
      - 'SQL_DATABASE_MAX_RESULT_BYTES=${SQL_DATABASE_MAX_RESULT_BYTES-100000}'
      - 'SQL_DATABASE_MAX_QUERY_CHARACTERS=${SQL_DATABASE_MAX_QUERY_CHARACTERS-20000}'
      - 'USER_PERMISSIONS_FEATURES_SQL_DATABASE=${USER_PERMISSIONS_FEATURES_SQL_DATABASE-false}'
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  openlaunch: {}
